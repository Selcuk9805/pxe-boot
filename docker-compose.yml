services:
  # ─────────────────────────────────────────────────────
  #  pxe-dhcp: DHCP Proxy + TFTP Sunucusu (dnsmasq)
  #  host network_mode zorunlu: DHCP broadcast'leri
  #  Docker bridge ağından geçemez.
  # ─────────────────────────────────────────────────────
  pxe-dhcp:
    build:
      context: ./docker/dnsmasq
    container_name: pxe-dhcp
    network_mode: host
    volumes:
      - ./config/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf:ro
      - ./tftp:/tftp:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────
  #  pxe-http: Nginx — kernel, initrd, squashfs, WIM servis
  #  iPXE tüm büyük dosyaları HTTP üzerinden alır.
  # ─────────────────────────────────────────────────────
  pxe-http:
    image: nginx:alpine
    container_name: pxe-http
    depends_on:
      - pxe-enroll
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./http:/usr/share/nginx/html:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────
  #  pxe-enroll: Persistent istemci profili auto-enroll
  #  Bilinmeyen MAC ilk boot'ta otomatik clone edilir.
  # ─────────────────────────────────────────────────────
  pxe-enroll:
    image: python:3.12-alpine
    container_name: pxe-enroll
    command: ["python", "/app/server.py"]
    volumes:
      - ./docker/persistent-enroll/server.py:/app/server.py:ro
      - ./.env:/app/.env:ro
      - ./nfs:/nfs
      - ./http:/http
    environment:
      - AUTO_ENROLL_PERSISTENT=1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────
  #  pxe-nfs: NFS Sunucusu — Persistent boot için
  #  Debian Live rootfs (RO) ve persistency overlay (RW)
  # ─────────────────────────────────────────────────────
  pxe-nfs:
    image: erichough/nfs-server:latest
    container_name: pxe-nfs
    ports:
      - "2049:2049"
      - "111:111/tcp"
      - "111:111/udp"
      - "32765:32765/tcp"
      - "32765:32765/udp"
      - "32767:32767/tcp"
      - "32767:32767/udp"
    volumes:
      - ./nfs:/nfs
      - ./config/nfs/exports:/etc/exports:ro
    environment:
      - NFS_LOG_LEVEL=INFO
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
