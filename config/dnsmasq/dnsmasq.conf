# ============================================================
# PXE Boot Sunucusu - dnsmasq Yapılandırması
# Mod: DHCP PROXY + TFTP Sunucusu
#
# ÖNEMLİ: Bu sunucu DHCP proxy modunda çalışır.
# Mevcut DHCP sunucunuz (router) IP dağıtmaya devam eder.
# dnsmasq sadece PXE boot bilgisini ekler.
# Genellikle router'da HİÇBİR değişiklik gerekmez.
# ============================================================

# ─── GENEL ──────────────────────────────────────────────────
# Log seviyesi — başlangıçta verbose, sonra kapatabilirsiniz
log-dhcp
# log-queries=extra   # Çok ayrıntılı, debug için
port=0                # DNS özelliğini kapat (sadece DHCP/TFTP). systemd-resolved çakışmasını önler.

# ─── OPSİYONEL: Arayüz Kısıtlaması ─────────────────────────
# Belirli bir ağ arayüzüne kısıtlamak için aşağıyı açın.
# Boş bırakılırsa tüm arayüzleri dinler.
# interface=eth0
# bind-interfaces

# ─── DHCP PROXY ─────────────────────────────────────────────
# Bu IP aralığı, ağınızın subnet'iyle eşleşmeli.
# Örnek: 10.30.1.x ağı için aşağıdaki satır doğrudur.
dhcp-range=10.30.1.0,proxy

# ─── TFTP SUNUCUSU ──────────────────────────────────────────
enable-tftp
tftp-root=/tftp

# ─── MİMARİ TESPİT ─────────────────────────────────────────
# Standart UEFI x86-64 (UEFI PXE)
dhcp-match=set:efi-x86_64,option:client-arch,7
# Alternatif UEFI x86-64 (bazı modern UEFI sistemler)
dhcp-match=set:efi-x86_64,option:client-arch,9
# Legacy BIOS
dhcp-match=set:bios,option:client-arch,0

# ─── iPXE TESPİT ────────────────────────────────────────────
# iPXE, option 175'i imza olarak gönderir.
# Bu tespit olmadan iPXE kendi kendini yeniden yükler (sonsuz döngü).
dhcp-match=set:ipxe,175

pxe-prompt="Network Boot Sunucusuna Baglaniliyor...", 0

# [1] iPXE değil + UEFI  →  TFTP üzerinden ipxe.efi indir
pxe-service=tag:!ipxe, X86-64_EFI, "Network Boot (UEFI)", ipxe.efi
pxe-service=tag:!ipxe, BC_EFI, "Network Boot (UEFI-BC)", ipxe.efi

# [2] iPXE değil + BIOS  →  TFTP üzerinden undionly.kpxe indir
pxe-service=tag:!ipxe, x86PC, "Network Boot (BIOS)", undionly.kpxe

# [3] iPXE zaten yüklü (her iki mimari)  →  HTTP boot menüsü
# Proxy DHCP, "pxe-service" olmadan yanıt vermeyi reddeder. iPXE menüyü yok sayıp dhcp-boot'u işler.
pxe-service=tag:ipxe, x86PC, "iPXE", boot.ipxe
pxe-service=tag:ipxe, X86-64_EFI, "iPXE", 0
pxe-service=tag:ipxe, BC_EFI, "iPXE", 0

dhcp-boot=tag:ipxe,http://10.30.1.20/boot.ipxe

# ─── ÖZEL MAC ATAMASI (OPSİYONEL) ──────────────────────────
# Belirli bir makineye farklı boot dosyası atamak için:
# dhcp-mac=set:sunucu1,AA:BB:CC:DD:EE:FF
# dhcp-boot=tag:sunucu1,http://10.30.1.20/boot/custom/sunucu1.ipxe
