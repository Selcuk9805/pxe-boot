worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format pxe '$remote_addr [$time_local] "$request" '
                   '$status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log pxe;

    # ── Büyük Dosya Optimizasyonu ────────────────────────────
    # squashfs, ISO, WIM gibi büyük dosyalar için kritik
    sendfile           on;
    sendfile_max_chunk 2m;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  120;
    keepalive_requests 1000;

    # Dosya boyutu sınırı yok (ISO/WIM dosyaları büyük olabilir)
    client_max_body_size 0;

    # ── Gzip Sıkıştırma ──────────────────────────────────────
    # Sadece küçük metin dosyaları için (iPXE script'leri vb.)
    gzip on;
    gzip_types text/plain text/css application/json;
    gzip_min_length 1000;
    gzip_comp_level 1;

    # ── MIME Tipleri ─────────────────────────────────────────
    types {
        text/plain                ipxe cfg;
        application/octet-stream efi kpxe wim iso squashfs img sdi;
    }

    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        charset utf-8;

        # Dizin listeleme (hangi dosyaların servis edildiğini görmek için)
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        # ── Büyük Binary Dosyalar ────────────────────────────
        # squashfs, WIM, ISO: gzip yok, direct I/O
        location ~* \.(squashfs|wim|iso|img|efi|kpxe)$ {
            add_header X-Accel-Buffering no;
            gzip off;
            sendfile on;
        }

        # ── iPXE Script'leri ─────────────────────────────────
        location ~* \.ipxe$ {
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Cache-Control "no-cache, no-store";
        }

        # ── Persistent Auto-Enroll API ─────────────────────
        location = /api/persistent/enroll.ipxe {
            proxy_pass http://pxe-enroll:8080/enroll.ipxe;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_http_version 1.1;
            proxy_buffering off;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Cache-Control "no-cache, no-store";
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
